<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTRPG Dice Probability</title>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-top">
        <h1>TTRPG Dice Probability</h1>
        <div class="header-toggles">
          <button id="dis-toggle" class="toggle-btn dis active">Disadvantage</button>
          <button id="adv-toggle" class="toggle-btn adv active">Advantage</button>
        </div>
      </div>
      <div class="header-controls">
        <div class="dice-input-group">
          <input type="text" id="dice-input" placeholder="3d8">
          <button id="dice-add" class="dice-add-btn" aria-label="Add dice">+</button>
        </div>
        <div id="dice-pills" class="dice-pills"></div>
        <div class="mod-inputs">
          <label>Min: <input type="number" id="min-mod" value="-2"></label>
          <label>Max: <input type="number" id="max-mod" value="5"></label>
        </div>
      </div>
    </header>
    <div id="dice-rows"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
