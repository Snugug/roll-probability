<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTRPG Dice Probability</title>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="title-row">
        <h1>TTRPG Dice Probability</h1>
        <div class="title-actions">
          <button id="download-btn" class="icon-btn" aria-label="Download config"></button>
          <button id="upload-btn" class="icon-btn" aria-label="Upload config"></button>
        </div>
      </div>
      <div class="header-controls">
        <div class="dice-input-group">
          <input type="text" id="dice-input" placeholder="3d8">
          <button id="dice-add" class="dice-add-btn" aria-label="Add dice">+</button>
        </div>
        <button id="dis-toggle" class="toggle-btn dis active">Disadvantage</button>
        <button id="adv-toggle" class="toggle-btn adv active">Advantage</button>
      </div>
    </header>
    <div id="dice-rows"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
